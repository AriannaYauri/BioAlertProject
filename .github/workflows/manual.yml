
name: Daily Activity

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Configure git
        run: |
          git config user.email "ariannayauriazabache18@gmail.com"
          git config user.name "AriannaYauri"

      - name: Make daily commit
        run: |
          COUNT=$((RANDOM % 5 + 1))
          for i in $(seq 1 $COUNT); do
            echo "- $(date '+%Y-%m-%d') update $i" >> CHANGELOG.md
            git add CHANGELOG.md
            git commit -m "chore: daily update"
          done
          git push
